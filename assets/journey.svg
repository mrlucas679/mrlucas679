<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Keorapetswe's journey — from CV-typing teacher to hackathon finalist">
  <defs>
    <linearGradient id="journeyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="pathGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5E6D3"/>
      <stop offset="30%" stop-color="#F74C00"/>
      <stop offset="60%" stop-color="#7B2FBE"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
    <style>
      .travel { stroke-dasharray: 6 10; animation: travel 14s linear infinite; }
      @keyframes travel { to { stroke-dashoffset: -320; } }
    </style>
  </defs>

  <rect width="1200" height="300" fill="url(#journeyBg)"/>

  <!-- Section label -->
  <text x="60" y="40" fill="#8b949e" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" letter-spacing="3">// THE PATH</text>
  <text x="60" y="74" fill="#F5E6D3" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="900">From typing CVs to shipping blockchains.</text>

  <!-- The path line -->
  <line x1="110" y1="180" x2="1090" y2="180" stroke="url(#pathGrad)" stroke-width="2.5"/>
  <line x1="110" y1="180" x2="1090" y2="180" stroke="#F5E6D3" stroke-width="1" class="travel" opacity="0.45"/>

  <!-- Node 1: CV Teacher -->
  <g transform="translate(180, 180)">
    <circle r="11" fill="#0D1117" stroke="#F5E6D3" stroke-width="2"/>
    <circle r="3" fill="#F5E6D3"/>
    <text y="-28" text-anchor="middle" fill="#F5E6D3" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2">2020–2022</text>
    <text y="40" text-anchor="middle" fill="#F5E6D3" font-family="Georgia, serif" font-size="15" font-weight="700">👨🏾‍🏫 youth educator</text>
    <text y="58" text-anchor="middle" fill="#c9d1d9" font-family="ui-monospace, monospace" font-size="10">taught CV typing</text>
    <text y="74" text-anchor="middle" fill="#8b949e" font-family="ui-monospace, monospace" font-size="10" font-style="italic">"saw the access gap"</text>
  </g>

  <!-- Node 2: Self-study starts -->
  <g transform="translate(410, 180)">
    <circle r="11" fill="#0D1117" stroke="#F74C00" stroke-width="2"/>
    <circle r="3" fill="#F74C00"/>
    <text y="-28" text-anchor="middle" fill="#F74C00" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2">2022–2024</text>
    <text y="40" text-anchor="middle" fill="#F5E6D3" font-family="Georgia, serif" font-size="15" font-weight="700">📖 the self-study</text>
    <text y="58" text-anchor="middle" fill="#c9d1d9" font-family="ui-monospace, monospace" font-size="10">F&amp;B App Academy · YT</text>
    <text y="74" text-anchor="middle" fill="#8b949e" font-family="ui-monospace, monospace" font-size="10" font-style="italic">"no degree. just reps."</text>
  </g>

  <!-- Node 3: TrustWork -->
  <g transform="translate(640, 180)">
    <circle r="11" fill="#0D1117" stroke="#7B2FBE" stroke-width="2"/>
    <circle r="3" fill="#7B2FBE"/>
    <text y="-28" text-anchor="middle" fill="#7B2FBE" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2">2025</text>
    <text y="40" text-anchor="middle" fill="#F5E6D3" font-family="Georgia, serif" font-size="15" font-weight="700">💼 first shipped</text>
    <text y="58" text-anchor="middle" fill="#c9d1d9" font-family="ui-monospace, monospace" font-size="10">TrustWork · 2 hackathons</text>
    <text y="74" text-anchor="middle" fill="#8b949e" font-family="ui-monospace, monospace" font-size="10" font-style="italic">"proof that I build"</text>
  </g>

  <!-- Node 4: Rust Africa 2026 (HIGHLIGHTED with medal) -->
  <g transform="translate(870, 180)">
    <circle r="20" fill="#F74C00" opacity="0.1"/>
    <circle r="14" fill="#0D1117" stroke="#F74C00" stroke-width="2.5"/>
    <text y="5" text-anchor="middle" font-size="16">🥈</text>
    <text y="-36" text-anchor="middle" fill="#F74C00" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2" font-weight="700">MAR 2026</text>
    <text y="45" text-anchor="middle" fill="#F5E6D3" font-family="Georgia, serif" font-size="15" font-weight="900">🥈 rust africa 2026</text>
    <text y="63" text-anchor="middle" fill="#c9d1d9" font-family="ui-monospace, monospace" font-size="10">hackathon · 2nd place</text>
    <text y="79" text-anchor="middle" fill="#F74C00" font-family="ui-monospace, monospace" font-size="10" font-style="italic" font-weight="700">"shipped MediChain"</text>
  </g>

  <!-- Node 5: Current (pulsing) -->
  <g transform="translate(1060, 180)">
    <circle r="11" fill="#0D1117" stroke="#00D9FF" stroke-width="2">
      <animate attributeName="r" values="11;15;11" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#00D9FF"/>
    <text y="-28" text-anchor="middle" fill="#00D9FF" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2" font-weight="700">NOW</text>
    <text y="40" text-anchor="middle" fill="#F5E6D3" font-family="Georgia, serif" font-size="15" font-weight="700">🟢 open to work</text>
    <text y="58" text-anchor="middle" fill="#c9d1d9" font-family="ui-monospace, monospace" font-size="10">hire me to ship</text>
    <text y="74" text-anchor="middle" fill="#00D9FF" font-family="ui-monospace, monospace" font-size="10" font-style="italic" font-weight="700">"let&apos;s build."</text>
  </g>

  <!-- Footer signature -->
  <text x="60" y="286" fill="#8b949e" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2">
    <tspan fill="#F74C00">//</tspan> every line of code earned with no shortcut.
  </text>
  <text x="1140" y="286" text-anchor="end" fill="#8b949e" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2">
    git log --author=&quot;rakau&quot; --oneline | wc -l → <tspan fill="#00D9FF">still counting</tspan>
  </text>
</svg>
