<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" width="1100" height="420" role="img" aria-label="neofetch — Keorapetswe system info">
  <defs>
    <linearGradient id="nfBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <style>
      .cursor { animation: blink 1.05s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
    </style>
  </defs>

  <!-- Terminal shell -->
  <rect width="1100" height="420" rx="8" fill="url(#nfBg)" stroke="#30363d" stroke-width="1"/>

  <!-- Window chrome -->
  <g>
    <rect x="0" y="0" width="1100" height="32" rx="8" fill="#161b22"/>
    <rect x="0" y="24" width="1100" height="10" fill="#161b22"/>
    <circle cx="22" cy="16" r="5.5" fill="#ff5f56"/>
    <circle cx="42" cy="16" r="5.5" fill="#ffbd2e"/>
    <circle cx="62" cy="16" r="5.5" fill="#27c93f"/>
    <text x="550" y="20" text-anchor="middle" fill="#8b949e" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" letter-spacing="1">rakau@soweto ── neofetch</text>
  </g>

  <!-- Prompt line -->
  <g transform="translate(36, 64)">
    <text font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15">
      <tspan fill="#F74C00" font-weight="700">rakau</tspan><tspan fill="#c9d1d9">@</tspan><tspan fill="#00D9FF">soweto</tspan><tspan fill="#c9d1d9">:~$ </tspan><tspan fill="#F5E6D3">neofetch --verbose</tspan>
    </text>
  </g>

  <!-- ASCII "KK" monogram (left side) -->
  <g transform="translate(56, 108)" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13" fill="#F74C00">
    <text y="0">   ██╗  ██╗  ██╗  ██╗</text>
    <text y="16">   ██║ ██╔╝  ██║ ██╔╝</text>
    <text y="32">   █████╔╝   █████╔╝ </text>
    <text y="48">   ██╔═██╗   ██╔═██╗ </text>
    <text y="64">   ██║  ██╗  ██║  ██╗</text>
    <text y="80">   ╚═╝  ╚═╝  ╚═╝  ╚═╝</text>
    <text y="108" fill="#00D9FF" font-size="13" letter-spacing="3">KEORAPETSWE · KGOATLHA</text>
    <text y="126" fill="#8b949e" font-size="13" letter-spacing="2">  — "Rakau" · mrlucas679 —</text>
    <text y="156" fill="#F5E6D3" font-size="13" letter-spacing="1">🇿🇦  soweto, naledi, gauteng</text>
  </g>

  <!-- System info on the right, field : value format -->
  <g transform="translate(440, 120)" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="15">
    <g>
      <text fill="#F74C00" font-weight="700">OS</text>
      <text x="150" fill="#c9d1d9">Soweto / Naledi v2026 🇿🇦 (LTS)</text>
    </g>
    <g transform="translate(0, 24)">
      <text fill="#F74C00" font-weight="700">Kernel</text>
      <text x="150" fill="#c9d1d9">self-taught 3.1.0-hustle-generic</text>
    </g>
    <g transform="translate(0, 48)">
      <text fill="#F74C00" font-weight="700">Uptime</text>
      <text x="150" fill="#c9d1d9">3+ years · still compiling</text>
    </g>
    <g transform="translate(0, 72)">
      <text fill="#F74C00" font-weight="700">Shell</text>
      <text x="150" fill="#c9d1d9">rust · typescript · python · bash</text>
    </g>
    <g transform="translate(0, 96)">
      <text fill="#F74C00" font-weight="700">DE</text>
      <text x="150" fill="#c9d1d9">vscode + tmux + rooibos</text>
    </g>
    <g transform="translate(0, 120)">
      <text fill="#F74C00" font-weight="700">Packages</text>
      <text x="150" fill="#c9d1d9">react, supabase, vite, three.js, +∞</text>
    </g>
    <g transform="translate(0, 144)">
      <text fill="#F74C00" font-weight="700">CPU</text>
      <text x="150" fill="#c9d1d9">Discipline × 4 cores @ 3.6 GHz</text>
    </g>
    <g transform="translate(0, 168)">
      <text fill="#F74C00" font-weight="700">GPU</text>
      <text x="150" fill="#c9d1d9">big-dream rendering unit (overclocked)</text>
    </g>
    <g transform="translate(0, 192)">
