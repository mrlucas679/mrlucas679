  <!-- Blinking prompt at bottom -->
  <g transform="translate(36, 406)">
    <text font-family="ui-monospace, monospace" font-size="15">
      <tspan fill="#F74C00" font-weight="700">rakau</tspan><tspan fill="#c9d1d9">@</tspan><tspan fill="#00D9FF">soweto</tspan><tspan fill="#c9d1d9">:~$ </tspan>
    </text>
    <rect x="204" y="-13" width="10" height="16" fill="#00D9FF" class="cursor"/>
  </g>
