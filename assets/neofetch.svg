      <text x="150" fill="#c9d1d9">🥈 Rust Africa Hackathon 2026</text>
    </g>
    <g transform="translate(0, 240)">
      <text fill="#F74C00" font-weight="700">Building</text>
      <text x="150" fill="#c9d1d9">medichain · trustwork · amandla · vmi</text>
    </g>
    <g transform="translate(0, 264)">
      <text fill="#F74C00" font-weight="700">Status</text>
      <text x="150" fill="#27c93f" font-weight="700">🟢 open to work · mentor me</text>
    </g>
    <g transform="translate(0, 288)">
      <text fill="#F74C00" font-weight="700">Mantra</text>
      <text x="150" fill="#F5E6D3" font-style="italic">"you can never stop learning" ♾️</text>
    </g>
  </g>

  <!-- Color dots (classic neofetch swatch) -->
  <g transform="translate(440, 400)">
    <rect width="18" height="10" fill="#0D1117"/>
    <rect x="22" width="18" height="10" fill="#F74C00"/>
    <rect x="44" width="18" height="10" fill="#27c93f"/>
    <rect x="66" width="18" height="10" fill="#ffbd2e"/>
    <rect x="88" width="18" height="10" fill="#00D9FF"/>
    <rect x="110" width="18" height="10" fill="#7B2FBE"/>
    <rect x="132" width="18" height="10" fill="#F5E6D3"/>
    <rect x="154" width="18" height="10" fill="#c9d1d9"/>
