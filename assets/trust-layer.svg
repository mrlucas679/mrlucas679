<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" width="1200" height="580" role="img" aria-label="Trust Layer thesis — the unifying mission across all projects">
  <defs>
    <linearGradient id="trustBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <!-- Project card gradients -->
    <linearGradient id="medichainG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="trustworkG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B2FBE" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7B2FBE" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="amandlaG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F74C00" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#F74C00" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="vmiG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5E6D3" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F5E6D3" stop-opacity="0.03"/>
    </linearGradient>

    <!-- Connector animation -->
    <style>
      .pulse { animation: pulse 3s ease-in-out infinite; transform-origin: center; }
      @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.85; } }
      .flow { stroke-dasharray: 4 8; animation: flow 30s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -240; } }
    </style>
  </defs>

  <rect width="1200" height="580" fill="url(#trustBg)"/>

  <!-- Top title strip -->
  <g>
    <text x="60" y="48" fill="#8b949e" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="17" letter-spacing="3">// THE THESIS</text>
    <text x="60" y="96" fill="#F5E6D3" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="900" letter-spacing="-1">Africa&apos;s trust layer is missing.</text>
    <text x="60" y="132" fill="#c9d1d9" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic" font-weight="300">I&apos;m writing it, one ship at a time.</text>
  </g>

  <!-- Separator -->
  <line x1="60" y1="158" x2="1140" y2="158" stroke="#30363d" stroke-width="1"/>

  <!-- Central hub -->
  <g transform="translate(600, 340)">
    <circle r="72" fill="none" stroke="#F74C00" stroke-width="1" opacity="0.15"/>
    <circle r="58" fill="none" stroke="#F74C00" stroke-width="1" opacity="0.28"/>
    <circle r="44" fill="#F74C00" opacity="0.08"/>
    <circle r="32" fill="#0D1117" stroke="#F74C00" stroke-width="1.5"/>
    <text y="-4" text-anchor="middle" fill="#F5E6D3" font-family="ui-monospace, monospace" font-size="14" font-weight="700" letter-spacing="2">TRUST</text>
    <text y="14" text-anchor="middle" fill="#F5E6D3" font-family="ui-monospace, monospace" font-size="14" font-weight="700" letter-spacing="2">LAYER</text>
  </g>

  <!-- Animated flow connectors (drawn below cards so cards sit on top) -->
  <g fill="none" stroke-width="1.2" opacity="0.5">
    <!-- to MediChain (top-left) -->
    <path d="M 600 340 L 230 250" stroke="#00D9FF" class="flow"/>
    <!-- to TrustWork (top-right) -->
    <path d="M 600 340 L 970 250" stroke="#7B2FBE" class="flow"/>
    <!-- to Amandla (bottom-left) -->
    <path d="M 600 340 L 230 460" stroke="#F74C00" class="flow"/>
    <!-- to VerifyMyInterview (bottom-right) -->
    <path d="M 600 340 L 970 460" stroke="#F5E6D3" class="flow"/>
  </g>

  <!-- ═══ CARD 1: MediChain (top-left) ═══ -->
  <g transform="translate(80, 190)">
    <rect width="300" height="130" rx="4" fill="url(#medichainG)" stroke="#00D9FF" stroke-width="1"/>
    <text x="18" y="28" fill="#00D9FF" font-family="ui-monospace, monospace" font-size="14" letter-spacing="2">01 · VERIFY WHO YOU ARE</text>
    <text x="18" y="62" fill="#F5E6D3" font-family="Georgia, serif" font-size="26" font-weight="900">🏥 MediChain</text>
    <text x="18" y="86" fill="#c9d1d9" font-family="Georgia, serif" font-size="14" font-style="italic">Blockchain-verified national health ID.</text>
    <text x="18" y="104" fill="#c9d1d9" font-family="Georgia, serif" font-size="14" font-style="italic">NFC &amp; QR emergency access, even offline.</text>
    <text x="18" y="122" fill="#8b949e" font-family="ui-monospace, monospace" font-size="14" letter-spacing="1">rust · smart-contracts · nfc</text>
  </g>

  <!-- ═══ CARD 2: TrustWork (top-right) ═══ -->
  <g transform="translate(820, 190)">
    <rect width="300" height="130" rx="4" fill="url(#trustworkG)" stroke="#7B2FBE" stroke-width="1"/>
    <text x="18" y="28" fill="#7B2FBE" font-family="ui-monospace, monospace" font-size="14" letter-spacing="2">02 · VERIFY WHAT YOU CAN DO</text>
    <text x="18" y="62" fill="#F5E6D3" font-family="Georgia, serif" font-size="26" font-weight="900">💼 TrustWork</text>
    <text x="18" y="86" fill="#c9d1d9" font-family="Georgia, serif" font-size="14" font-style="italic">Freelance marketplace with real</text>
    <text x="18" y="104" fill="#c9d1d9" font-family="Georgia, serif" font-size="14" font-style="italic">skill testing &amp; certification.</text>
    <text x="18" y="122" fill="#8b949e" font-family="ui-monospace, monospace" font-size="14" letter-spacing="1">react · typescript · supabase</text>
  </g>

  <!-- ═══ CARD 3: Amandla (bottom-left) ═══ -->
  <g transform="translate(80, 400)">
    <rect width="300" height="130" rx="4" fill="url(#amandlaG)" stroke="#F74C00" stroke-width="1"/>
    <text x="18" y="28" fill="#F74C00" font-family="ui-monospace, monospace" font-size="14" letter-spacing="2">03 · VERIFY YOU ARE HEARD</text>
    <text x="18" y="62" fill="#F5E6D3" font-family="Georgia, serif" font-size="26" font-weight="900">🤟🏾 Amandla</text>
    <text x="18" y="86" fill="#c9d1d9" font-family="Georgia, serif" font-size="14" font-style="italic">Real-time SASL interpreter with a 3D</text>
    <text x="18" y="104" fill="#c9d1d9" font-family="Georgia, serif" font-size="14" font-style="italic">signing avatar. For the deaf community.</text>
    <text x="18" y="122" fill="#8b949e" font-family="ui-monospace, monospace" font-size="14" letter-spacing="1">python · electron · three.js</text>
  </g>

  <!-- ═══ CARD 4: VerifyMyInterview (bottom-right) ═══ -->
  <g transform="translate(820, 400)">
    <rect width="300" height="130" rx="4" fill="url(#vmiG)" stroke="#F5E6D3" stroke-width="1"/>
    <text x="18" y="28" fill="#F5E6D3" font-family="ui-monospace, monospace" font-size="14" letter-spacing="2">04 · VERIFY WHO IS ON THE CALL</text>
    <text x="18" y="62" fill="#F5E6D3" font-family="Georgia, serif" font-size="26" font-weight="900">🔐 VerifyMyInterview</text>
    <text x="18" y="86" fill="#c9d1d9" font-family="Georgia, serif" font-size="14" font-style="italic">Anti-proxy, anti-ghost-candidate</text>
    <text x="18" y="104" fill="#c9d1d9" font-family="Georgia, serif" font-size="14" font-style="italic">interview verification. Hiring integrity.</text>
    <text x="18" y="122" fill="#8b949e" font-family="ui-monospace, monospace" font-size="14" letter-spacing="1">typescript · private · early-stage</text>
  </g>

  <!-- Footer signature -->
  <g transform="translate(60, 558)">
    <text fill="#8b949e" font-family="ui-monospace, monospace" font-size="15" letter-spacing="2">
      <tspan fill="#F74C00">//</tspan> one man. one township. four products. one thesis.
    </text>
    <text x="1080" text-anchor="end" fill="#8b949e" font-family="ui-monospace, monospace" font-size="15" letter-spacing="2">
      <tspan fill="#00D9FF">rakau@soweto</tspan>:<tspan fill="#7B2FBE">~/mission</tspan>$ _
    </text>
  </g>
</svg>
