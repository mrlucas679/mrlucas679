name: Snake

on:
  # Specify what triggers this workflow.
  pull_request:
    branches: [ main ]

jobs:
  build-and-run-snake-script:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      
    - name: Setup Rust and Node.js dependencies
      run: |
        curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        npm install -g typescript
        
    - name: Build and Run Snake Script
      env:
        RUN_SNAKE_SCRIPT_PATH: $(pwd)/snake_script.sh  # Assuming the script is in this repo, adjust path as needed.
      run: bash $RUN_SNAKE_SCRIPT_PATH
